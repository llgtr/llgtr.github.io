  <script>
    const toggleFrame = (event) => {
      document.getElementById("veil").classList.toggle("active")
      document.body.classList.toggle("veil-visible")
      const imgElem = document.getElementById("focusedImg")
      if (event) {
        imgElem.src = event.src
      }
    }
  </script>
